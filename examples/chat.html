<!doctype html>
<html lang="en" x-data :class="{ 'dark': $store.darkMode.value }">
  <head>
    <script>(()=>{if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark')})()</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} - LLM Router</title>
    {{if .HostCSSFile}}<link rel="stylesheet" href="{{.HostCSSFile}}" />{{end}}
    <link rel="stylesheet" href="{{.Prefix}}/assets/chat.css" />
    <!-- Order matters: markdown.js exposes window.processMarkdown, then
         chat.js registers the alpine:init listener, then the host bundle
         loads Alpine and fires alpine:init. Defer preserves document
         order, so markdown.js → chat.js → host bundle. -->
    <script defer src="{{.Prefix}}/assets/markdown.js"></script>
    <script defer src="{{.Prefix}}/assets/chat.js"></script>
    <script defer src="{{.HostJSFile}}"></script>
  </head>
  <body class="min-h-screen bg-slate-100 dark:bg-slate-950 transition-colors duration-300">
    <div x-data="webchat({ prefix: '{{.Prefix}}' })" x-init="init()" x-cloak>
      <!-- Top nav — mirrors the admin pages so the chat tab is visually part of the same app. -->
      <header class="sticky top-0 z-40 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
          <!-- Logo -->
          <a href="/admin/" class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow shadow-blue-500/25">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
              </svg>
            </div>
            <span class="font-bold text-slate-900 dark:text-white">LLM Router</span>
          </a>
          <!-- Nav links + actions -->
          <nav class="flex items-center gap-1">
            <a href="/admin/" class="nav-link">Dashboard</a>
            <a href="{{.Prefix}}" class="nav-link nav-link-active">Chat</a>
            <a href="/admin/models" class="nav-link">Models</a>
            <a href="/admin/mcp-servers" class="nav-link">MCP Servers</a>
            <div class="w-px h-5 bg-slate-200 dark:bg-slate-700 mx-2"></div>
            <button @click="$store.darkMode.toggle()" class="nav-link cursor-pointer" aria-label="Toggle dark mode" title="Toggle dark mode">
              <svg x-show="!$store.darkMode.value" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
              </svg>
              <svg x-show="$store.darkMode.value" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
            </button>
            <button @click="logout()" class="nav-link cursor-pointer text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Logout
            </button>
          </nav>
        </div>
      </header>

      <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 h-[calc(100vh-4rem)] flex">
        <!-- Sidebar: conversation list + new chat -->
        <aside class="w-64 shrink-0 hidden md:flex flex-col border-r border-slate-200 dark:border-slate-800 pr-4">
          <button @click="newChat()"
                  class="w-full mb-4 px-3 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium transition-colors cursor-pointer flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            New Chat
          </button>
          <div class="flex-1 overflow-y-auto space-y-1">
            <template x-for="c in conversations" :key="c.id">
              <button @click="loadConversation(c.id)"
                      class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors"
                      :class="c.id === currentId ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'"
                      x-text="c.title || 'New conversation'"></button>
            </template>
            <p x-show="conversations.length === 0" class="text-xs text-slate-400 dark:text-slate-500 px-3 py-2">No saved conversations.</p>
          </div>
        </aside>

        <!-- Chat column -->
        <section class="flex-1 flex flex-col min-w-0 pl-0 md:pl-6">
          <!-- Empty / setup state -->
          <div x-show="!currentId" class="flex-1 flex items-center justify-center">
            <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6">
              <h2 class="text-xl font-semibold text-slate-900 dark:text-white mb-1">Start a new chat</h2>
              <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Pick a persona and a model to begin.</p>
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Persona</label>
              <select x-model="setupPersonaId" class="input-field mb-4">
                <template x-for="p in personas" :key="p.id">
                  <option :value="p.id" x-text="p.name"></option>
                </template>
              </select>
              <p x-show="setupPersonaDescription" class="text-xs text-slate-500 dark:text-slate-400 -mt-2 mb-4" x-text="setupPersonaDescription"></p>

              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Model</label>
              <select x-model="setupModel" class="input-field mb-6">
                <template x-for="m in models" :key="m.id">
                  <option :value="m.id" x-text="m.label || m.id"></option>
                </template>
              </select>

              <button @click="startChat()"
                      :disabled="!setupModel"
                      class="w-full px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 dark:disabled:bg-slate-700 disabled:cursor-not-allowed text-white text-sm font-medium transition-colors cursor-pointer">
                Start chat
              </button>
            </div>
          </div>

          <!-- Active chat -->
          <div x-show="currentId" class="flex-1 flex flex-col min-h-0">
            <!-- Chat header: persona/model + tool availability -->
            <div class="flex items-center justify-between mb-4 px-1">
              <div class="flex items-center gap-3 min-w-0">
                <span class="text-sm font-medium text-slate-900 dark:text-white truncate" x-text="currentPersonaName"></span>
                <span class="text-xs text-slate-400 dark:text-slate-500 truncate" x-text="currentModel"></span>
              </div>
              <div class="flex items-center gap-2">
                <button @click="showToolsPanel = !showToolsPanel"
                        class="text-xs px-2 py-1 rounded-md text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors cursor-pointer"
                        :class="{ 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300': showToolsPanel }"
                        x-text="enabledToolsCount + ' tools'"></button>
                <button @click="deleteCurrent()" title="Delete chat"
                        class="p-1 text-slate-400 hover:text-red-600 dark:hover:text-red-300 transition-colors cursor-pointer">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
              </div>
            </div>

            <!-- Tools side panel -->
            <div x-show="showToolsPanel" x-transition class="mb-4 p-3 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 max-h-48 overflow-y-auto">
              <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wide">Tools</span>
                <label class="text-xs flex items-center gap-1 text-slate-500 dark:text-slate-400 cursor-pointer">
                  <input type="checkbox" @change="toggleAllTools($event)" :checked="enabledToolsCount === allTools.length" class="sr-only peer" />
                  <span class="relative w-4 h-2 bg-slate-300 dark:bg-slate-600 rounded-full peer-checked:bg-blue-500 after:content-[''] after:absolute after:top-0 after:left-0 after:w-2 after:h-2 after:rounded-full after:bg-white after:transition-all peer-checked:after:translate-x-2"></span>
                  All
                </label>
              </div>
              <div class="space-y-1">
                <template x-for="t in allTools" :key="t.name">
                  <label class="flex items-center gap-2 text-xs cursor-pointer">
                    <input type="checkbox" :value="t.name" x-model="enabledTools" class="rounded border-slate-300 dark:border-slate-600 text-blue-600 focus:ring-blue-500" />
                    <span class="font-mono text-slate-700 dark:text-slate-300 truncate" x-text="t.name"></span>
                  </label>
                </template>
                <p x-show="allTools.length === 0" class="text-xs text-slate-400 dark:text-slate-500">No tools available.</p>
              </div>
            </div>

            <!-- Messages -->
            <div x-ref="messages" @scroll="onMessagesScroll($event)"
                 class="flex-1 overflow-y-auto space-y-4 pr-1 relative">
              <template x-for="(m, idx) in messages" :key="idx">
                <!-- Skip tool-role messages from the main loop. Their result
                     is rendered inline within the originating assistant
                     bubble's Tool calls disclosure (call.result), so showing
                     them again here would just duplicate the output as a
                     flat bubble below the call card. The data stays in
                     messages[] so the model still sees the result in context
                     on the next turn. -->
                <template x-if="m.role !== 'tool'">
                <div class="flex" :class="m.role === 'user' ? 'justify-end' : 'justify-start'">
                  <div class="w-full rounded-2xl px-4 py-2 text-sm whitespace-pre-wrap break-words transition-shadow"
                       :class="[
                         m.role === 'user'
                           ? 'bg-blue-600 text-white'
                           : 'bg-white dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700',
                         // While this assistant bubble is the one streaming,
                         // give it a soft blue glow so the user's eye tracks
                         // where new content is appearing.
                         (streaming && idx === messages.length - 1) ? 'shadow-md shadow-blue-500/10 border-blue-300 dark:border-blue-700' : ''
                       ]">
                    <!-- Tool calls attached to this assistant message,
                         bundled into a single collapsible "Tool calls"
                         disclosure (knot pattern). Each call shows its
                         args, approval buttons (if pending), and result
                         (if executed). Auto-expanded while any call is
                         pending so the user can confirm; collapses to a
                         summary once all are resolved. -->
                    <template x-if="m.role === 'assistant' && m.tool_calls && m.tool_calls.length > 0">
                      <div x-data="{ get autoOpen() { return m.tool_calls.some(c => c.approval === 'pending' || c.approval === 'approving' || c.approval === 'denying'); }, open: true }"
                           x-init="open = autoOpen"
                           class="mb-3">
                        <button @click="open = !open" type="button"
                                class="w-full flex items-center gap-2 text-xs font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded p-1.5 transition-colors">
                          <svg class="w-3.5 h-3.5 transition-transform" :class="open ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                          </svg>
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                          </svg>
                          <span x-text="m.tool_calls.length + ' tool call' + (m.tool_calls.length === 1 ? '' : 's')"></span>
                          <span class="ml-auto flex items-center gap-1 text-[10px]">
                            <span class="px-1.5 py-0.5 rounded bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300"
                                  x-text="m.tool_calls.filter(c => c.approval === 'approved').length + ' ok'"></span>
                            <span x-show="m.tool_calls.some(c => c.approval === 'pending' || c.approval === 'approving' || c.approval === 'denying')"
                                  class="px-1.5 py-0.5 rounded bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300">pending</span>
                            <span x-show="m.tool_calls.some(c => c.approval === 'denied' || c.approval === 'error')"
                                  class="px-1.5 py-0.5 rounded bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300">issues</span>
                          </span>
                        </button>
                        <div x-show="open" x-transition class="mt-2 space-y-3">
                          <template x-for="call in m.tool_calls" :key="call.id">
                            <div class="border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden">
                              <!-- Call header: tool name + status pill -->
                              <div class="bg-slate-50 dark:bg-slate-900/40 border-b border-slate-200 dark:border-slate-700 px-3 py-2 flex items-center gap-2">
                                <code class="bg-blue-100 dark:bg-blue-800 px-2 py-0.5 rounded text-xs font-mono text-blue-700 dark:text-blue-300" x-text="call.name"></code>
                                <span class="text-[10px] uppercase tracking-wide text-slate-500 dark:text-slate-400 capitalize"
                                      x-show="call.approval && call.approval !== 'pending'"
                                      x-text="call.approval"></span>
                              </div>
                              <!-- Args (always shown so the user can audit
                                   what the model wanted to do). -->
                              <div x-show="call.arguments && Object.keys(call.arguments || {}).length > 0"
                                   class="px-3 py-2 text-xs text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900">
                                <span class="font-medium">Arguments:</span>
                                <div class="mt-1 bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded p-2 overflow-x-auto max-h-32">
                                  <pre class="text-slate-600 dark:text-slate-400 font-mono text-xs whitespace-pre" x-text="JSON.stringify(call.arguments, null, 2)"></pre>
                                </div>
                              </div>
                              <!-- Approval buttons (only when pending). -->
                              <div x-show="call.approval === 'pending'"
                                   class="px-3 py-3 bg-amber-50 dark:bg-amber-900/20 border-t border-amber-200 dark:border-amber-800">
                                <div class="text-xs text-amber-800 dark:text-amber-200 mb-2 font-medium">Allow this tool to run?</div>
                                <div class="flex items-center gap-3">
                                  <button type="button" @click="approveToolCall(call, false)"
                                          class="px-4 py-2 text-xs font-medium rounded-md bg-blue-600 text-white hover:bg-blue-700 cursor-pointer">
                                    Allow
                                  </button>
                                  <button type="button" @click="approveToolCall(call, true)"
                                          class="px-4 py-2 text-xs font-medium rounded-md bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 hover:bg-blue-200 dark:hover:bg-blue-900/60 cursor-pointer">
                                    Always Allow
                                  </button>
                                  <button type="button" @click="denyToolCall(call)"
                                          class="px-4 py-2 text-xs font-medium rounded-md bg-slate-200 text-slate-900 hover:bg-slate-300 dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600 cursor-pointer">
                                    Deny
                                  </button>
                                </div>
                              </div>
                              <!-- Result (shown after execution / denial). -->
                              <div x-show="call.result != null"
                                   class="px-3 py-2 text-xs bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700">
                                <span class="font-medium text-slate-700 dark:text-slate-300">Result:</span>
                                <div class="mt-1 bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded p-2 overflow-x-auto max-h-64">
                                  <pre class="font-mono text-xs whitespace-pre"
                                       :class="call.isError || call.approval === 'denied' ? 'text-red-600 dark:text-red-400' : 'text-slate-600 dark:text-slate-400'"
                                       x-text="call.result"></pre>
                                </div>
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                    <!-- Reasoning disclosure (collapsed by default once
                         the turn ends; auto-expanded while reasoning
                         streams in). Mirrors knot's Thinking panel. -->
                    <div x-show="m.role === 'assistant' && m.thinking" x-data="{ open: m.showThinking }" class="rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40 overflow-hidden mb-3">
                      <button @click="open = !open" type="button" class="w-full flex items-center gap-2 px-3 py-2 text-xs font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                        </svg>
                        <span>Thinking</span>
                        <svg class="w-3 h-3 ml-auto transition-transform" :class="{ 'rotate-180': open }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                      </button>
                      <div x-show="open" x-transition
                           class="px-3 pb-3 pt-1 text-xs text-slate-600 dark:text-slate-300 border-t border-slate-200 dark:border-slate-700 whitespace-pre-wrap font-mono leading-relaxed"
                           x-text="m.thinking"></div>
                    </div>
                    <!-- Assistant content rendered through the markdown
                         processor (code, tables, lists, etc.). -->
                    <template x-if="!(m.role === 'assistant' && m.tool_calls && m.tool_calls.length > 0)">
                      <div>
                        <div x-show="m.role === 'assistant'" class="prose-chat">
                          <template x-if="m.content"><div x-html="formatContent(m.content)"></div></template>
                          <span x-show="streaming && idx === messages.length - 1 && m.content"
                                class="inline-block w-2 h-4 align-text-bottom ml-0.5 bg-blue-500 dark:bg-blue-400 animate-blink"></span>
                        </div>
                        <div x-show="m.role !== 'assistant' && m.role !== 'tool'" class="inline" x-text="m.content"></div>
                        <!-- Bouncing dots while waiting for the first delta. -->
                        <div x-show="m.role === 'assistant' && streaming && idx === messages.length - 1 && !m.content && (!m.tool_calls || m.tool_calls.length === 0)"
                             class="flex items-center gap-2 py-2" role="status" aria-label="Loading response">
                          <span class="sr-only">Loading response…</span>
                          <span class="flex space-x-1">
                            <span class="w-2.5 h-2.5 bg-slate-400 dark:bg-slate-500 rounded-full webchat-bounce"></span>
                            <span class="w-2.5 h-2.5 bg-slate-400 dark:bg-slate-500 rounded-full webchat-bounce" style="animation-delay: 0.1s"></span>
                            <span class="w-2.5 h-2.5 bg-slate-400 dark:bg-slate-500 rounded-full webchat-bounce" style="animation-delay: 0.2s"></span>
                          </span>
                          <span class="text-xs text-slate-400 dark:text-slate-500">thinking…</span>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
                </template>
              </template>
              <!-- Note: no separate "thinking" or "busy" element. The empty
                   assistant bubble itself carries the bouncing dots (above)
                   until the first delta arrives, then carries the streaming
                   text + typing cursor. One bubble, one place to look. -->

              <!-- Jump-to-bottom button: appears when the user has scrolled
                   up while a response is streaming, so they can snap back
                   to the latest output without having to wheel all the way
                   down. Clicking also clears userHasScrolled so auto-scroll
                   resumes. -->
              <div x-show="userHasScrolled" x-transition.opacity
                   class="sticky bottom-2 flex justify-center pointer-events-none">
                <button @click="userHasScrolled = false; scrollToBottom()"
                        class="pointer-events-auto px-3 py-1.5 rounded-full bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 text-xs font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer flex items-center gap-1.5">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                  </svg>
                  Latest
                </button>
              </div>
            </div>

            <!-- Composer. shrink-0 stops the flex column from collapsing
                 this when the transcript overflows; the textarea's own
                 max-h-40 caps its growth. -->
            <div class="shrink-0 pt-2">
              <div x-show="commandHint" class="text-xs text-slate-500 dark:text-slate-400 mb-1" x-text="commandHint"></div>
              <div class="flex items-end gap-2">
                <textarea
                  x-ref="composer"
                  x-model="draft"
                  @keydown.enter="onEnter($event)"
                  @keydown.arrow-up="onArrowUp($event)"
                  @keydown.arrow-down="onArrowDown($event)"
                  rows="1"
                  placeholder="Type a message... (/ for commands, shift+enter for newline, ↑/↓ for history)"
                  class="flex-1 resize-none rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-2 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 max-h-40 overflow-y-auto"
                ></textarea>
                <button x-show="!streaming" @click="send()" :disabled="streaming || !draft.trim()"
                        class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 dark:disabled:bg-slate-700 disabled:cursor-not-allowed text-white text-sm font-medium cursor-pointer">
                  Send
                </button>
                <button x-show="streaming" @click="cancelStream()"
                        class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-700 text-white text-sm font-medium cursor-pointer flex items-center gap-1.5">
                  <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5" /></svg>
                  Stop
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <style>
      [x-cloak] { display: none !important; }
      .input-field {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid rgb(203 213 225);
        background-color: white;
        color: rgb(15 23 42);
        font-size: 0.875rem;
      }
      .dark .input-field {
        background-color: rgb(15 23 42);
        border-color: rgb(51 65 85);
        color: white;
      }
    </style>
  </body>
</html>
